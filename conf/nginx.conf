#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

  proxy_pass        http://127.0.0.1:__PORT__/;

  include proxy_params_no_auth;
  proxy_pass_header Server;
  proxy_buffering off;
  more_set_headers "X-Frame-Options : ALLOWALL";
  more_clear_headers "Content-Security-Policy";
  more_set_headers "Content-Security-Policy: default-src 'self' https: data: blob:; connect-src 'self' https: wss: ws:; img-src 'self' https: data: blob:; style-src 'self' https: 'unsafe-inline'; script-src 'self' https: 'unsafe-inline' 'unsafe-eval'; worker-src 'self' blob:;";
}
